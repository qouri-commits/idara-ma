kind = "mobile"
previewPath = "/"
title = "IDARA.ma"
version = "1.0.0"
id = "artifacts/idara-ma"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24658

[services.development]
run = "pnpm --filter @workspace/idara-ma run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/idara-ma", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/idara-ma", "run", "serve" ]

[services.env]
PORT = "24658"
BASE_PATH = "/"
